name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + lint (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build

      - name: Lint (swift-format)
        run: swift format lint --recursive Sources Package.swift
